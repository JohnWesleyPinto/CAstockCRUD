<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CAStock - Sistema inteligente e seguro para controle de estoque e registro de vendas de produtos do Centro Acadêmico.">
  <title>CAStock - Histórico de Vendas</title>
  <!-- Google Fonts: Outfit e Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=2.0">
</head>
<body>

  <!-- Toast Notification System (Sistema de Toasts Premium) -->
  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <!-- Main Application Wrapper -->
  <div id="app">
    
    <!-- ==========================================
         PAINEL PRINCIPAL (DASHBOARD)
         ========================================== -->
    <main id="dashboard-screen" class="screen active">
      
      <!-- Cabeçalho (Navbar) com Links Navegáveis -->
      <header class="dashboard-header">
        <div class="header-brand">
          <svg class="brand-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
            <line x1="12" y1="22.08" x2="12" y2="12"></line>
          </svg>
          <span class="brand-title">CAStock</span>
          <span class="brand-badge">Operacional</span>
        </div>

        <!-- Links de Navegação Premium -->
        <nav class="dashboard-nav" aria-label="Menu principal">
          <a href="/" id="tab-vendas" class="nav-tab">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="9" cy="21" r="1"></circle>
              <circle cx="20" cy="21" r="1"></circle>
              <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
            <span>Operação de Vendas</span>
          </a>
          <a href="/estoque.html" id="tab-estoque" class="nav-tab">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span>Controle de Estoque</span>
          </a>
          <a href="/historico.html" id="tab-historico" class="nav-tab active">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <span>Histórico de Vendas</span>
          </a>
        </nav>
      </header>

      <!-- Área de Páginas do Dashboard -->
      <div class="dashboard-container">
        
        <!-- PÁGINA: HISTÓRICO DE VENDAS -->
        <div id="view-historico" class="view-historico">
          
          <!-- Bloco de Histórico de Vendas -->
          <section class="card card-historico" aria-labelledby="section-historico" style="grid-column: 1;">
            <header class="card-header">
              <div class="card-title-container">
                <svg class="card-header-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"></circle>
                  <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                <h2 id="section-historico" class="card-title">Vendas Recentes</h2>
              </div>
              <p class="card-subtitle">Histórico consolidado de todas as saídas de mercadorias registradas.</p>
            </header>

            <!-- Lista de histórico de vendas em tela cheia -->
            <div class="table-responsive">
              <table class="table" id="sales-table">
                <thead>
                  <tr>
                    <th>Data/Hora</th>
                    <th>Produto</th>
                    <th class="text-center">Quantidade Vendida</th>
                    <th class="text-right">Valor Total</th>
                  </tr>
                </thead>
                <tbody id="sales-table-body">
                  <tr>
                    <td colspan="4" class="text-center text-muted py-4">Nenhuma venda registrada ainda.</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>
        </div>

      </div>
    </main>
  </div>

  <script src="app.js?v=2.0"></script>
</body>
</html>
