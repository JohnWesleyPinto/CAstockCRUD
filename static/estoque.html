<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CAStock - Sistema inteligente e seguro para controle de estoque e registro de vendas de produtos do Centro Acadêmico.">
  <title>CAStock - Controle de Estoque</title>
  <!-- Google Fonts: Outfit e Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=2.0">
</head>
<body>

  <!-- Toast Notification System (Sistema de Toasts Premium) -->
  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <!-- Main Application Wrapper -->
  <div id="app">
    
    <!-- ==========================================
         PAINEL PRINCIPAL (DASHBOARD)
         ========================================== -->
    <main id="dashboard-screen" class="screen active">
      
      <!-- Cabeçalho (Navbar) com Links Navegáveis -->
      <header class="dashboard-header">
        <div class="header-brand">
          <svg class="brand-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
            <line x1="12" y1="22.08" x2="12" y2="12"></line>
          </svg>
          <span class="brand-title">CAStock</span>
          <span class="brand-badge">Operacional</span>
        </div>

        <!-- Links de Navegação Premium -->
        <nav class="dashboard-nav" aria-label="Menu principal">
          <a href="/" id="tab-vendas" class="nav-tab">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="9" cy="21" r="1"></circle>
              <circle cx="20" cy="21" r="1"></circle>
              <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
            <span>Operação de Vendas</span>
          </a>
          <a href="/estoque.html" id="tab-estoque" class="nav-tab active">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span>Controle de Estoque</span>
          </a>
          <a href="/historico.html" id="tab-historico" class="nav-tab">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <span>Histórico de Vendas</span>
          </a>
        </nav>
      </header>

      <!-- Área de Páginas do Dashboard -->
      <div class="dashboard-container">
        
        <!-- PÁGINA: CONTROLE DE ESTOQUE -->
        <div id="view-estoque" class="view-estoque">
          
          <!-- Bloco de Inventário / Estoque -->
          <section class="card card-estoque" aria-labelledby="section-estoque">
            <header class="card-header">
              <div class="card-title-container">
                <svg class="card-header-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                  <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <h2 id="section-estoque" class="card-title">Controle de Estoque</h2>
              </div>
              <div class="card-actions">
                <!-- Botão para abrir modal de cadastro nativo <dialog> -->
                <button type="button" class="btn btn-outline btn-sm" onclick="openNewProductModal()">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                  </svg>
                  <span>Novo Produto</span>
                </button>
              </div>
            </header>

            <!-- Filtro de busca de produtos -->
            <div class="search-bar-container">
              <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              </svg>
              <input type="text" id="search-products" placeholder="Filtrar por nome de produto..." oninput="filterProductsTable()">
            </div>

            <!-- Tabela de Produtos -->
            <div class="table-responsive">
              <table class="table" id="products-table">
                <thead>
                  <tr>
                    <th>Nome do Produto</th>
                    <th class="text-right">Preço</th>
                    <th class="text-center">Quantidade</th>
                    <th class="text-center">Status</th>
                    <th class="text-center" style="width: 80px;">Ações</th>
                  </tr>
                </thead>
                <tbody id="products-table-body">
                  <tr>
                    <td colspan="5" class="text-center text-muted py-4">Nenhum produto cadastrado.</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>
        </div>

      </div>
    </main>

    <!-- ==========================================
         3. DIALOG MODAL: CADASTRO DE PRODUTO
         ========================================== -->
    <dialog id="new-product-dialog" closedby="any" aria-labelledby="modal-title">
      <div class="dialog-content">
        <header class="dialog-header">
          <h3 id="modal-title" class="dialog-title">Cadastrar Novo Produto</h3>
          <button type="button" class="btn-dialog-close" onclick="closeNewProductModal()" aria-label="Fechar modal">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </header>
        
        <form id="new-product-form" onsubmit="handleCreateProduct(event)">
          <div class="input-group">
            <label for="prod-name">Nome do Produto</label>
            <input type="text" id="prod-name" required placeholder="Ex: Guaraná Lata 350ml">
          </div>
          
          <div class="input-row">
            <div class="input-group">
              <label for="prod-price">Preço Unitário (R$)</label>
              <input type="number" id="prod-price" min="0.01" step="0.01" required placeholder="5,50">
            </div>
            
            <div class="input-group">
              <label for="prod-stock">Estoque Inicial</label>
              <input type="number" id="prod-stock" min="0" required placeholder="30">
            </div>
          </div>

          <div class="dialog-actions">
            <button type="button" class="btn btn-outline" onclick="closeNewProductModal()">Cancelar</button>
            <button type="submit" id="btn-product-submit" class="btn btn-primary">
              <span>Salvar Produto</span>
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </button>
          </div>
        </form>
      </div>
    </dialog>

  </div>

  <script src="app.js?v=2.0"></script>
</body>
</html>
